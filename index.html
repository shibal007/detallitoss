<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
}

/* SOBRE */

.envelope{
width:220px;
height:150px;
position:relative;
cursor:pointer;
perspective:1000px;
}

.base{
width:100%;
height:100%;
background:#ff4d6d;
position:absolute;
border-radius:5px;
}

.flap{
width:100%;
height:100%;
background:#ff758f;
position:absolute;
clip-path:polygon(0 0,100% 0,50% 60%);
transform-origin:top;
transition:transform 1s;
}

.envelope.open .flap{
transform:rotateX(180deg);
}

/* CARTA */

.letter{
position:absolute;
width:200px;
height:130px;
background:white;
left:10px;
top:10px;
border-radius:5px;
padding:10px;
box-sizing:border-box;
transform:translateY(40px);
transition:transform 1s;
opacity:0;
}

.envelope.open .letter{
transform:translateY(-120px);
opacity:1;
}

.text{
font-size:14px;
text-align:center;
color:#333;
}

/* CORAZONES */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-600px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">

<div class="base"></div>

<div class="flap"></div>

<div class="letter">
<div class="text">

Hola my loveee ❤️  
<br><br>
"Hay cosas que solo contigo se vuelven irresistibles."
te amo como JK ama el leche de platano
<br><br>
Gracias por existir en mi vida.  
<br><br>
💖te quiero cariño muaskkk💖

</div>
</div>

</div>

<script>

function openLetter(){

document.querySelector(".envelope").classList.add("open")

for(let i=0;i<20;i++){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),4000)

}

}

</script>

</body>
</html>
